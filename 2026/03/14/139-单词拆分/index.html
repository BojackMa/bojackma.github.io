          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">//s.substr(start, length) 从 start 开始，截取 length 个字符</span><br><span class="line">//s.substr(start)   从 start 截到结尾</span><br><span class="line">//字符串之间可以用 == 比较</span><br><span class="line">//s.find(substring) 查找字串      按位置访问的容器是没有的，比如说vector、deque</span><br><span class="line">//s.insert(pos, str) 插入字串       按值查找的容器就有，比如说map、set</span><br><span class="line">//s.erase(start, length) 删除</span><br><span class="line">//s.replace(start, length, newString) 替换</span><br><span class="line">//reverse(s.begin(), s.end());</span><br><span class="line">//sort(s.begin(), s.end());</span><br><span class="line">//stoi(s)   字符串转数字</span><br></pre></td></tr></table></figure>



<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    bool wordBreak(string s, vector&lt;string&gt;&amp; wordDict) &#123;</span><br><span class="line"></span><br><span class="line">        int n = s.size();</span><br><span class="line">        vector&lt;bool&gt; dp(n + 1, false);</span><br><span class="line">        dp[0] = true;</span><br><span class="line"></span><br><span class="line">        unordered_set&lt;string&gt; dict;</span><br><span class="line">        for(auto word : wordDict)&#123;</span><br><span class="line">            dict.insert(word);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        for (int i = 1; i &lt;= n; i++) &#123;</span><br><span class="line">            for (int j = 0; j &lt; i; j++) &#123;</span><br><span class="line">                if (dp[j] &amp;&amp; dict.count(s.substr(j, i - j))) &#123;</span><br><span class="line">                    dp[i] = true;</span><br><span class="line">                    break;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return dp[n];</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure></div>
