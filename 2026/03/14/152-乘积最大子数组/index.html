        <h1 class="header-title" itemprop="headline">152. 乘积最大子数组</h1>
          <div class="post-meta">

            <span itemprop="author">
              <span itemprop="name">Bojack Ma</span>
            </span>
          </div>
        </header>

          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">这道题和 第300题 相似，DP 数组的定义要想一想。DP 数组并不是直接存储题目的最终答案，而是更关注状态的可传递性，即能否将问题拆解为子问题。因此，我们需要以 nums[i] 结尾来定义 DP 数组。</span><br></pre></td></tr></table></figure>


<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int maxProduct(vector&lt;int&gt;&amp; nums) &#123;</span><br><span class="line">        int res = nums[0];  //先给一个值</span><br><span class="line">        vector&lt;int&gt; minDp(nums.size());</span><br><span class="line">        vector&lt;int&gt; maxDp(nums.size());</span><br><span class="line"></span><br><span class="line">        //初始化dp数组</span><br><span class="line">        for(int i = 0; i &lt; nums.size(); i++)&#123;</span><br><span class="line">            minDp[i] = nums[i];</span><br><span class="line">            maxDp[i] = nums[i];</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        //开始更新</span><br><span class="line">        for(int i = 1; i &lt; nums.size(); i++)&#123;</span><br><span class="line">            int tmp1 = nums[i] * minDp[i - 1];</span><br><span class="line">            int tmp2 = nums[i] * maxDp[i - 1];</span><br><span class="line">            minDp[i] = min(min(tmp1, tmp2), minDp[i]);  //C++ 的 min / max 并不支持三个参数，要写成这样。</span><br><span class="line">            maxDp[i] = max(max(tmp1, tmp2), maxDp[i]);</span><br><span class="line">            res = max(res, maxDp[i]);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return res;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line">//minDp表示以 nums[i] 结尾的 最小乘积</span><br><span class="line">//maxDp以 nums[i] 结尾的 最大乘积   </span><br><span class="line"></span><br><span class="line">//这个我当时想不到怎么处理负数，其实很简单的，再开个数组保存一下，也就是保存最小负数和最大正数，这样就行了</span><br><span class="line"></span><br><span class="line">//不管怎么说，加上前面的数组，两个数组肯定有所变化</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
