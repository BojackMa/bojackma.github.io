          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"></span><br></pre></td></tr></table></figure>



<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int minDistance(string word1, string word2) &#123;</span><br><span class="line">        int m = word1.size();</span><br><span class="line">        int n = word2.size();</span><br><span class="line"></span><br><span class="line">        // dp[i][j]：word1 前 i 个字符 转换成 word2 前 j 个字符的最少操作数</span><br><span class="line">        vector&lt;vector&lt;int&gt;&gt; dp(m + 1, vector&lt;int&gt;(n + 1));</span><br><span class="line"></span><br><span class="line">        // 初始化</span><br><span class="line">        for (int i = 0; i &lt;= m; ++i) dp[i][0] = i;  // 删除</span><br><span class="line">        for (int j = 0; j &lt;= n; ++j) dp[0][j] = j;  // 插入</span><br><span class="line"></span><br><span class="line">        for (int i = 1; i &lt;= m; ++i) &#123;</span><br><span class="line">            for (int j = 1; j &lt;= n; ++j) &#123;</span><br><span class="line"></span><br><span class="line">                if (word1[i - 1] == word2[j - 1]) &#123;</span><br><span class="line">                    dp[i][j] = dp[i - 1][j - 1];  // 字符相同</span><br><span class="line">                &#125; </span><br><span class="line">                else &#123;</span><br><span class="line">                    int replace = dp[i - 1][j - 1];</span><br><span class="line">                    int del = dp[i - 1][j];</span><br><span class="line">                    int insert = dp[i][j - 1];</span><br><span class="line"></span><br><span class="line">                    dp[i][j] = min(&#123;replace, del, insert&#125;) + 1;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return dp[m][n];</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">// 本题可以使用动态规划解决。</span><br><span class="line">// 定义 dp[i][j] 表示 word1 的前 i 个字符转换成 word2 的前 j 个字符所需要的最少操作数。</span><br><span class="line">// 当 word1[i-1] == word2[j-1] 时，两个字符相同，不需要额外操作，因此 dp[i][j] = dp[i-1][j-1]。</span><br><span class="line">// 当字符不同时，可以进行三种操作：替换、删除、插入，分别对应</span><br><span class="line">// dp[i-1][j-1] + 1、dp[i-1][j] + 1、dp[i][j-1] + 1，取三者的最小值即可。</span><br><span class="line">// 初始状态下，当一个字符串为空时，只能通过插入或删除操作进行转换，因此 dp[i][0] = i，dp[0][j] = j。</span><br><span class="line">// 最终答案为 dp[m][n]。</span><br></pre></td></tr></table></figure></div>
