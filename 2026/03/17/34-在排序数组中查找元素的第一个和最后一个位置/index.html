        <h1 class="header-title" itemprop="headline">34. 在排序数组中查找元素的第一个和最后一个位置</h1>
          <div class="post-meta">
            <time>Mar 17, 2026</time>
            <span itemprop="author">
              <span itemprop="name">Bojack Ma</span>
            </span>
          </div>
        </header>

          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">    int findLeft(vector&lt;int&gt;&amp; nums, int target) &#123;</span><br><span class="line">        int left = 0, right = nums.size() - 1;</span><br><span class="line">        int ans = -1;</span><br><span class="line">        while (left &lt;= right) &#123;</span><br><span class="line">            int mid = left + (right - left) / 2;</span><br><span class="line">            if (nums[mid] == target)&#123;</span><br><span class="line">                ans = mid;     //找到了一个，记录下来</span><br><span class="line">                right = mid - 1;            //此时不返回，继续找，所以说区间向左！！！！</span><br><span class="line">            &#125; </span><br><span class="line">            else if (nums[mid] &gt;= target) &#123; // 可能是答案，但还要往左看</span><br><span class="line">                right = mid - 1;</span><br><span class="line">            &#125; else &#123;</span><br><span class="line">                left = mid + 1;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        return ans;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    int findRight(vector&lt;int&gt;&amp; nums, int target) &#123;</span><br><span class="line">        int left = 0, right = nums.size() - 1;</span><br><span class="line">        int ans = -1;</span><br><span class="line">        while (left &lt;= right) &#123;</span><br><span class="line">            int mid = left + (right - left) / 2;</span><br><span class="line">            if (nums[mid] == target)&#123;</span><br><span class="line">                ans = mid;     //找到了一个，更新一下</span><br><span class="line">                left = mid + 1;            //此时不返回，继续找，所以说区间向右！！！！</span><br><span class="line">            &#125; </span><br><span class="line">            else if (nums[mid] &lt; target) &#123; </span><br><span class="line">                left = mid + 1;</span><br><span class="line">            &#125; else &#123;</span><br><span class="line">                right = mid - 1;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        return ans;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">public:</span><br><span class="line">    vector&lt;int&gt; searchRange(vector&lt;int&gt;&amp; nums, int target) &#123;</span><br><span class="line">        vector&lt;int&gt; ans;</span><br><span class="line">        ans.push_back(findLeft(nums, target));</span><br><span class="line">        ans.push_back(findRight(nums, target));</span><br><span class="line">        return ans;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line">//最终的解法就是在模版上进行微调，对left和right进行修改。</span><br><span class="line"></span><br><span class="line">//这里的二分查找还不一样！！！因为不是非严格递增的序列，可能有多个mid符合要求，这样可能会提前结束。</span><br><span class="line"></span><br><span class="line">//难不成用两遍二分查找</span><br><span class="line">//我先找target和target + 1，从而解决问题，还是不要这样。找到了先记录一下，然后继续找，知道压迫到极点。</span><br><span class="line"></span><br></pre></td></tr></table></figure></div>
