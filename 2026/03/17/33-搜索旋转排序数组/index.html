        <h1 class="header-title" itemprop="headline">33. 搜索旋转排序数组</h1>

          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">这个二分的核心根本思想是去掉一半不可能的区间，这个是关键！！一定要转变思路！！！</span><br></pre></td></tr></table></figure>


<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line">//始终有个区间是有序的，只和有序的区间比较就行了！！！这个二分的核心根本思想是去掉一半不可能的区间，这个是关键！！</span><br><span class="line"></span><br><span class="line">class Solution &#123;    </span><br><span class="line">public:</span><br><span class="line">    int search(vector&lt;int&gt;&amp; nums, int target) &#123;</span><br><span class="line">        int left = 0, right = nums.size() - 1;</span><br><span class="line">        while (left &lt;= right) &#123;</span><br><span class="line">            int mid = left + (right - left) / 2;</span><br><span class="line">            // 找到了</span><br><span class="line">            if (nums[mid] == target) return mid;</span><br><span class="line">            // 左半边有序</span><br><span class="line">            if (nums[left] &lt;= nums[mid]) &#123;      //只和单调的区间去比较，另一个区间不去考虑</span><br><span class="line">                // target 在左半边</span><br><span class="line">                if (nums[left] &lt;= target &amp;&amp; target &lt; nums[mid]) &#123;</span><br><span class="line">                    right = mid - 1;</span><br><span class="line">                &#125; else &#123; // 否则去右半边</span><br><span class="line">                    left = mid + 1;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">            // 否则右半边有序</span><br><span class="line">            else &#123;</span><br><span class="line">                // target 在右半边</span><br><span class="line">                if (nums[mid] &lt; target &amp;&amp; target &lt;= nums[right]) &#123;</span><br><span class="line">                    left = mid + 1;</span><br><span class="line">                &#125; else &#123; // 否则去左半边</span><br><span class="line">                    right = mid - 1;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        return -1;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure></div>
