        <h1 class="header-title" itemprop="headline">153. 寻找旋转排序数组中的最小值</h1>
          <div class="post-meta">
            <time>Mar 17, 2026</time>
            <span itemprop="author">
              <span itemprop="name">Bojack Ma</span>
            </span>
          </div>
        </header>

          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line">//经典的思路：选择二分，总有一个区间是递增的，那个区间就比较好取最小值，然后取处理另一个区间</span><br><span class="line">//不一定一定要找最小值，但是可以把所有的可能的最小值找到！！！</span><br><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int findMin(vector&lt;int&gt;&amp; nums) &#123;</span><br><span class="line">        int left = 0; int right = nums.size() - 1;</span><br><span class="line">        int ans = 5005;</span><br><span class="line">        while(left &lt;= right)&#123;</span><br><span class="line">            int mid = left + (right - left) / 2;</span><br><span class="line">            //说明前面是有序区间</span><br><span class="line">            if(nums[mid] &gt;= nums[left])&#123;</span><br><span class="line">                ans = min(ans, nums[left]);</span><br><span class="line">                left = mid + 1;</span><br><span class="line">            &#125;</span><br><span class="line">            else&#123;</span><br><span class="line">                ans = min(ans, nums[mid]);</span><br><span class="line">                right = mid - 1;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">        return ans;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure></div>
