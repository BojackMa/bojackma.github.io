        <h1 class="header-title" itemprop="headline">1594. 矩阵的最大非负积</h1>
          <div class="post-meta">

          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int maxProductPath(vector&lt;vector&lt;int&gt;&gt;&amp; grid) &#123;</span><br><span class="line">        int m = grid.size();</span><br><span class="line">        int n = grid[0].size();     //还是要这么写，后面记得加括号</span><br><span class="line">        vector&lt;vector&lt;long long int&gt;&gt; cursum_max(m, vector&lt;long long int&gt;(n, 0));    //这个表示能取到的最大值</span><br><span class="line">        vector&lt;vector&lt;long long int&gt;&gt; cursum_min(m, vector&lt;long long int&gt;(n, 0));    //这个表示能取到的最小值</span><br><span class="line"></span><br><span class="line">        cursum_max[0][0] = cursum_min[0][0] = grid[0][0];</span><br><span class="line">        </span><br><span class="line"></span><br><span class="line">        for(int i = 1; i &lt; grid[0].size(); i++)&#123;</span><br><span class="line">            cursum_max[0][i] = cursum_min[0][i] = cursum_max[0][i - 1] * grid[0][i];</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        for(int i = 1; i &lt; grid.size(); i++)&#123;</span><br><span class="line">            cursum_max[i][0] = cursum_min[i][0] = cursum_max[i - 1][0] * grid[i][0];</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        for(int i = 1; i &lt; grid.size(); i++)&#123;     </span><br><span class="line">            for(int j = 1; j &lt; grid[0].size(); j++)&#123;</span><br><span class="line">                </span><br><span class="line">                long long int tmp1 = grid[i][j] *  cursum_max[i - 1][j];</span><br><span class="line">                long long int tmp2 = grid[i][j] *  cursum_min[i - 1][j];</span><br><span class="line">                </span><br><span class="line">                long long int tmp3 = grid[i][j] *  cursum_max[i][j - 1];</span><br><span class="line">                long long int tmp4 = grid[i][j] *  cursum_min[i][j - 1];</span><br><span class="line"></span><br><span class="line">                cursum_max[i][j] = max(max(tmp1, tmp2), max(tmp3, tmp4));</span><br><span class="line">                cursum_min[i][j] = min(min(tmp1, tmp2), min(tmp3, tmp4));</span><br><span class="line"></span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        if(cursum_max[m - 1][n - 1] &gt;= 0)</span><br><span class="line">            return cursum_max[m - 1][n - 1] % (1000000000 + 7);</span><br><span class="line">        else return -1;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">//还是要选择最大值和最小值作为中间态，而不是最大正数或者最小负数，因为每个格子只有两种选择，上面或者左边，保存好这两种状态就可以</span><br><span class="line"></span><br><span class="line">// 在 DP 中，如果一个状态未来可能“翻转价值”（比如乘负数），那你必须保留“极值”，而不是“类别”</span><br></pre></td></tr></table></figure></div>
