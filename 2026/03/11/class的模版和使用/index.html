"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    MyClass a;               <span class="comment">// 默认构造        这两种创建方式要注意！！！</span></span><br><span class="line">    MyClass* b = <span class="keyword">new</span> <span class="built_in">MyClass</span>(<span class="number">30</span>);  <span class="comment">// 对象 b 在堆上     这两种创建方式要注意！！！</span></span><br><span class="line">    <span class="function">MyClass <span class="title">c</span><span class="params">(<span class="number">20</span>, <span class="number">95.5</span>)</span></span>;     <span class="comment">// 多参数构造</span></span><br><span class="line"></span><br><span class="line">    a.<span class="built_in">print</span>();  <span class="comment">// 输出: val=0, score=0</span></span><br><span class="line">    b.<span class="built_in">print</span>();  <span class="comment">// 输出: val=30, score=0</span></span><br><span class="line">    c.<span class="built_in">print</span>();  <span class="comment">// 输出: val=20, score=95.5</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></div>
