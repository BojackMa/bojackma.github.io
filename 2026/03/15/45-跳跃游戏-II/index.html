          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int jump(vector&lt;int&gt;&amp; nums) &#123;</span><br><span class="line"></span><br><span class="line">        int curFar = 0;          // 当前跳能到的最远边界</span><br><span class="line">        int nextFar = 0;         // 下次跳能到的最远位置</span><br><span class="line">        int curJumptime = 0;     // 已跳跃次数</span><br><span class="line"></span><br><span class="line">        if(nums.size() == 1) return 0;  // 特判，原地就是终点</span><br><span class="line"></span><br><span class="line">        for(int i = 0; i &lt; nums.size() - 1; i++)&#123; // 遍历到倒数第二个元素就够了</span><br><span class="line">            nextFar = max(nextFar, i + nums[i]); // 更新当前跳范围内能到的最远位置</span><br><span class="line"></span><br><span class="line">            if(i == curFar)&#123;    // 到达当前跳的边界，必须跳一次</span><br><span class="line">                curJumptime++;</span><br><span class="line">                curFar = nextFar;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return curJumptime;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure></div>
