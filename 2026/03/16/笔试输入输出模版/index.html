        <h1 class="header-title" itemprop="headline">笔试输入输出模版</h1>

          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">endl是换行</span><br><span class="line"></span><br><span class="line">while (cin &gt;&gt; a &gt;&gt; b)&#123;</span><br><span class="line">    // 如果成功读到数据，返回 true，继续读取</span><br><span class="line">    // 如果读取到输入结束（EOF），返回 false</span><br><span class="line">    // cin一次的逻辑是，跳过所有遇到的分隔符，然后读取连续合法字符，如果遇到空白字符就停止！！！空格、换行（所有空白字符包括tab）标志着分隔符，下一个数据</span><br><span class="line">    //如果数据是\n\n54321\n\n,那么cin &gt;&gt; a; a读取到的是54321,其中的\n\n没有被消耗掉！！！</span><br><span class="line">    </span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>


<h3 id="经典输入方式"><a href="#经典输入方式" class="headerlink" title="经典输入方式"></a>经典输入方式</h3><h4 id="第一行给-T-组数据（竞赛最常见）"><a href="#第一行给-T-组数据（竞赛最常见）" class="headerlink" title="第一行给 T 组数据（竞赛最常见）"></a>第一行给 T 组数据（竞赛最常见）</h4><p>第一行输入一个整数 T，表示有 T 组测试数据</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">3</span><br><span class="line">1 2</span><br><span class="line">3 4</span><br><span class="line">5 6</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">#include &lt;iostream&gt;</span><br><span class="line">using namespace std;</span><br><span class="line"></span><br><span class="line">int main() &#123;</span><br><span class="line">    int T;</span><br><span class="line">    cin &gt;&gt; T;</span><br><span class="line"></span><br><span class="line">    while (T--) &#123;</span><br><span class="line">        int a, b;</span><br><span class="line">        cin &gt;&gt; a &gt;&gt; b;</span><br><span class="line">        cout &lt;&lt; a + b &lt;&lt; endl;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h4 id="读到-EOF（ACM-经典模式）"><a href="#读到-EOF（ACM-经典模式）" class="headerlink" title="读到 EOF（ACM 经典模式）"></a>读到 EOF（ACM 经典模式）</h4><p>题目会说多组输入，直到文件结束</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">1 2</span><br><span class="line">3 4</span><br><span class="line">5 6</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">#include &lt;iostream&gt;</span><br><span class="line">using namespace std;</span><br><span class="line"></span><br><span class="line">int main() &#123;</span><br><span class="line">    int a, b;</span><br><span class="line"></span><br><span class="line">    while (cin &gt;&gt; a &gt;&gt; b) &#123;</span><br><span class="line">        cout &lt;&lt; a + b &lt;&lt; endl;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>


<h3 id="如果想读取字符串"><a href="#如果想读取字符串" class="headerlink" title="如果想读取字符串"></a>如果想读取字符串</h3><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">hello world</span><br></pre></td></tr></table></figure>


<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">string s;</span><br><span class="line"></span><br><span class="line">//下面这两个一定要绑定在一起，因为一定要去除之前一行的换行，一定要死记硬背</span><br><span class="line">cin.ignore();       //忽略一个字符，可以是\n</span><br><span class="line">getline(cin, s);    //getline的逻辑是一直读直到遇到 \n，换句话说就是读取一行</span><br></pre></td></tr></table></figure>


<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">输入：</span><br><span class="line">3</span><br><span class="line">9</span><br><span class="line">one space</span><br><span class="line">11</span><br><span class="line">two  spaces</span><br><span class="line">14</span><br><span class="line">three   spaces</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">输出：</span><br><span class="line">ecapseno</span><br><span class="line">secapsowt</span><br><span class="line">secapseerht</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">#include &lt;bits/stdc++.h&gt;</span><br><span class="line">using namespace std;</span><br><span class="line"></span><br><span class="line">int main() &#123;</span><br><span class="line">    int t;</span><br><span class="line">    cin &gt;&gt; t;</span><br><span class="line"></span><br><span class="line">    while(t--)&#123;</span><br><span class="line">        int n;</span><br><span class="line">        cin &gt;&gt; n;</span><br><span class="line">        cin.ignore();  // 清掉上一行换行</span><br><span class="line">        string s;</span><br><span class="line">        getline(cin, s);    //这两个是绑定在一起的</span><br><span class="line">        string ans;</span><br><span class="line">        for(char c : s)&#123;</span><br><span class="line">            if(c != &#x27; &#x27;)</span><br><span class="line">                ans += c;</span><br><span class="line">        &#125;</span><br><span class="line">        reverse(ans.begin(), ans.end());</span><br><span class="line">        cout &lt;&lt; ans &lt;&lt; endl;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>


<h3 id="printf输出控制格式（针对小数等情况）"><a href="#printf输出控制格式（针对小数等情况）" class="headerlink" title="printf输出控制格式（针对小数等情况）"></a>printf输出控制格式（针对小数等情况）</h3><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">printf(&quot;格式控制字符串&quot;, 变量1, 变量2, ...);</span><br><span class="line"></span><br><span class="line">%d      → int</span><br><span class="line">%lld    → long long</span><br><span class="line">%f      → double</span><br><span class="line">%.kf    → 保留 k 位小数</span><br><span class="line">%nd     → 输出宽度至少为 n,默认右对齐,左侧补空格</span><br><span class="line">%0nd    → 补零输出，</span><br><span class="line">%s      → 字符串</span><br><span class="line"></span><br></pre></td></tr></table></figure>


<h3 id="一些常量"><a href="#一些常量" class="headerlink" title="一些常量"></a>一些常量</h3><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">M_PI 表示3.14，在&lt;cmath&gt;这个头文件里面</span><br><span class="line">感觉到时候自己背一背也差不多3.1415926</span><br></pre></td></tr></table></figure>
