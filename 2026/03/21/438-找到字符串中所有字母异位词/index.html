          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    vector&lt;int&gt; findAnagrams(string s, string p) &#123;</span><br><span class="line">        multiset&lt;char&gt; standard;</span><br><span class="line">        multiset&lt;char&gt; compare;</span><br><span class="line"></span><br><span class="line">        for(auto pp : p)    standard.insert(pp);</span><br><span class="line"></span><br><span class="line">        int left = 0;</span><br><span class="line">        int right = p.size() - 1;</span><br><span class="line"></span><br><span class="line">        vector&lt;int&gt; ans;</span><br><span class="line">        if(s.size() &lt; p.size()) return ans;</span><br><span class="line">        for(int i = 0; i &lt; p.size(); i++)  &#123;</span><br><span class="line">            compare.insert(s[i]);</span><br><span class="line">        &#125; </span><br><span class="line"></span><br><span class="line">        while(1)&#123;</span><br><span class="line">            if(compare == standard) &#123;</span><br><span class="line">                ans.emplace_back(left);</span><br><span class="line">            &#125;</span><br><span class="line">            compare.erase(compare.find(s[left]));</span><br><span class="line">            left++;</span><br><span class="line">            right++;</span><br><span class="line">            if(right == s.size())   break;</span><br><span class="line">            compare.insert(s[right]);</span><br><span class="line">        &#125;</span><br><span class="line">        return ans;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br></pre></td></tr></table></figure></div>
