        <h1 class="header-title" itemprop="headline">128.最长连续序列</h1>

          <div class="page-content"><p>关键的set函数</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">set&lt;int&gt; s;</span><br><span class="line">//1、插入元素</span><br><span class="line">s.insert(10);</span><br><span class="line">//2、删除元素</span><br><span class="line">s.erase(10);</span><br><span class="line">//3、计数</span><br><span class="line">s.count(5);</span><br><span class="line">//4、find(集合型容器如set、map都有find命令)</span><br><span class="line">if (s.find(5) != s.end())</span><br></pre></td></tr></table></figure>

<p>下面这个还是蛮重要的</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">for (auto it = us.begin(); it != us.end(); ++it) &#123;  //所有 STL 容器都可以用迭代器这种方式遍历</span><br></pre></td></tr></table></figure>



<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int longestConsecutive(vector&lt;int&gt;&amp; nums) &#123;</span><br><span class="line"></span><br><span class="line">        unordered_set&lt;int&gt; us;</span><br><span class="line">        int ans = 0;</span><br><span class="line"></span><br><span class="line">        for(int i = 0; i &lt; nums.size(); i++)&#123;</span><br><span class="line">            us.insert(nums[i]);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        //选择遍历容器而不是数组是因为数组里面重复的太多了，us可以去重</span><br><span class="line">        for (auto it = us.begin(); it != us.end(); ++it) &#123;  //所有 STL 容器都可以用迭代器这种方式遍历</span><br><span class="line">            int nums = *it;</span><br><span class="line">            if(us.count(nums - 1) == 1) continue;    //我们要抓到数字的头</span><br><span class="line">            int tail = nums;</span><br><span class="line">            while(us.count(tail) == 1)&#123;         //找到尾巴</span><br><span class="line">                tail++;</span><br><span class="line">            &#125;</span><br><span class="line">            ans = max(ans, tail - nums);</span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return ans;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br><span class="line">//时间复杂度应该是o（3n）</span><br></pre></td></tr></table></figure></div>
