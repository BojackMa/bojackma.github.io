          <div class="page-content"><p>下面这两个可能比较常用</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">swap(nums[i], nums[index]); </span><br><span class="line">reverse(nums.begin() + j, nums.end());</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    void nextPermutation(vector&lt;int&gt;&amp; nums) &#123;</span><br><span class="line">        int n = nums.size();</span><br><span class="line">        int j = n - 1;</span><br><span class="line"></span><br><span class="line">        // 从右向左找到第一个不满足降序的点，因为排列的变化只可能从尾部开始最小调整。</span><br><span class="line">        while (j &gt; 0 &amp;&amp; nums[j] &lt;= nums[j - 1]) &#123;</span><br><span class="line">            j--;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        // 如果j == 0，说明整个数组是降序，直接反转，这是特殊情况</span><br><span class="line">        if (j == 0) &#123;</span><br><span class="line">            reverse(nums.begin(), nums.end());</span><br><span class="line">            return;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        int i = j - 1; // 记录第一个不满足降序的位置，这里是元素5</span><br><span class="line">        int index = n - 1;</span><br><span class="line"></span><br><span class="line">        // 从右向左找到第一个比nums[i]大的元素，这里是元素6</span><br><span class="line">        while (nums[index] &lt;= nums[i]) &#123;</span><br><span class="line">            index--;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        // 交换</span><br><span class="line">        swap(nums[i], nums[index]);    //5764变成6754</span><br><span class="line"></span><br><span class="line">        // 反转j到末尾的部分，使其变为升序</span><br><span class="line">        reverse(nums.begin() + j, nums.end());    //6754变成6457</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure></div>
