          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">如何判断是否要用DP？这个很关键！！！我觉得一定要记住这个！！！</span><br><span class="line">1 是否要求“最值 / 方案数 / 是否可以”</span><br><span class="line">2 是否可以拆成更小的子问题</span><br><span class="line">3 子问题是否会重复</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int rob(vector&lt;int&gt;&amp; nums) &#123;</span><br><span class="line"></span><br><span class="line">        int n = nums.size();</span><br><span class="line">        if (n == 1) return nums[0];</span><br><span class="line">        if (n == 2) return max(nums[0], nums[1]);</span><br><span class="line"></span><br><span class="line">        // dp[i] 表示：前 i 间房子能偷到的最大金额</span><br><span class="line">        vector&lt;int&gt; dp(n + 1);</span><br><span class="line"></span><br><span class="line">        dp[0] = 0;</span><br><span class="line">        dp[1] = nums[0];</span><br><span class="line">        dp[2] = max(nums[0], nums[1]);</span><br><span class="line"></span><br><span class="line">        for (int i = 3; i &lt;= n; i++) &#123;</span><br><span class="line">            // 不偷第 i 间 或 偷第 i 间</span><br><span class="line">            dp[i] = max(dp[i - 1], dp[i - 2] + nums[i - 1]);</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return dp[n];</span><br><span class="line">    &#125;</span><br><span class="line">&#125;;</span><br></pre></td></tr></table></figure>
</div>
