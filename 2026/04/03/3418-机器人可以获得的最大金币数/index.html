          <div class="page-content"><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br></pre></td><td class="code"><pre><span class="line">class Solution &#123;</span><br><span class="line">public:</span><br><span class="line">    int maximumAmount(vector&lt;vector&lt;int&gt;&gt;&amp; coins) &#123;</span><br><span class="line">        int m = coins.size(), n = coins[0].size();</span><br><span class="line">        const int INF = -1e9;</span><br><span class="line">        vector dp(m, vector(n, vector&lt;int&gt;(3, INF)));</span><br><span class="line"></span><br><span class="line">        // 初始化</span><br><span class="line">        if (coins[0][0] &gt;= 0) &#123;</span><br><span class="line">            dp[0][0][0] = coins[0][0];</span><br><span class="line">        &#125; else &#123;</span><br><span class="line">            dp[0][0][0] = coins[0][0]; // 不感化</span><br><span class="line">            dp[0][0][1] = 0;           // 感化</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        //两种情况：格子为正，dp[i][j][k] = max(上, 左) + coins[i][j]，不要用感化次数</span><br><span class="line">        //格子为负，不感化，dp[i][j][k] = max(上, 左) + coins[i][j]；感化，dp[i][j][k] = max(上, 左，且来自 k-1) + 0</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        for (int i = 0; i &lt; m; i++) &#123;</span><br><span class="line">            for (int j = 0; j &lt; n; j++) &#123;</span><br><span class="line">                for (int k = 0; k &lt;= 2; k++) &#123;</span><br><span class="line">                    if (i == 0 &amp;&amp; j == 0) continue;</span><br><span class="line">                    int val = coins[i][j];</span><br><span class="line">                    // 从上 or 左</span><br><span class="line">                    if (i &gt; 0) &#123;</span><br><span class="line">                        // 不感化</span><br><span class="line">                        dp[i][j][k] = max(dp[i][j][k], dp[i-1][j][k] + val);</span><br><span class="line"></span><br><span class="line">                        // 感化</span><br><span class="line">                        if (val &lt; 0 &amp;&amp; k &gt; 0) &#123;</span><br><span class="line">                            dp[i][j][k] = max(dp[i][j][k], dp[i-1][j][k-1]);</span><br><span class="line">                        &#125;</span><br><span class="line">                    &#125;</span><br><span class="line"></span><br><span class="line">                    if (j &gt; 0) &#123;</span><br><span class="line">                        // 不感化</span><br><span class="line">                        dp[i][j][k] = max(dp[i][j][k], dp[i][j-1][k] + val);</span><br><span class="line"></span><br><span class="line">                        // 感化</span><br><span class="line">                        if (val &lt; 0 &amp;&amp; k &gt; 0) &#123;</span><br><span class="line">                            dp[i][j][k] = max(dp[i][j][k], dp[i][j-1][k-1]);</span><br><span class="line">                        &#125;</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        return max(&#123;dp[m-1][n-1][0],</span><br><span class="line">                    dp[m-1][n-1][1],</span><br><span class="line">                    dp[m-1][n-1][2]&#125;);</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line">//我一开始不知道怎么处理这个感化</span><br><span class="line">//实际上是没有从“状态完整性”出发建模</span><br><span class="line">//决策历史（用了几次感化）会影响未来，这个本质上就是可以直接加一维状态来处理，类似的还有</span><br><span class="line">//最多用 K 次某种能力、可以跳过/忽略某些元素、有限资源</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">//下面的情况可以扩展维度</span><br><span class="line">//当前位置够不够描述状态？</span><br><span class="line">//历史选择会不会影响未来？</span><br><span class="line">//有没有“次数限制 / 资源限制”？</span><br><span class="line"></span><br><span class="line">//dp[i][j][k] = 到达 (i,j)，已经使用了 k 次感化时的最大金币</span><br><span class="line"></span><br><span class="line">//用系统常量是完全没问题的INT_MAX，INT_MIN，但是不能够加减，会有溢出问题</span><br><span class="line"></span><br><span class="line">//用1e9和-1e9比较安全</span><br><span class="line"></span><br></pre></td></tr></table></figure></div>
